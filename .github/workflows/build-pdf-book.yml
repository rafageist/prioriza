name: Build Quarto Book

on:
  push:
    branches:
      - master
      - main
      - docs/quarto-book-v0.4
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX
        run: quarto install tinytex --update-path

      - name: Render HTML
        run: quarto render --to html

      - name: Render PDF
        id: render_pdf
        continue-on-error: true
        run: quarto render --to pdf

      - name: Record PDF render limitation
        if: steps.render_pdf.outcome == 'failure'
        run: |
          {
            echo "PDF render failed in CI.";
            echo "HTML render completed before the PDF attempt.";
            echo "Check the Quarto and LaTeX logs for missing packages or PDF-specific errors.";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Quarto output
        uses: actions/upload-artifact@v4
        with:
          name: prioriza-quarto-output
          path: _output/
          if-no-files-found: error
