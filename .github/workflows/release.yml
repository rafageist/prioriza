name: Release PDF

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read manifest version
        id: manifest
        run: |
          VERSION=$(python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("manifest.yml").read_text(encoding="utf-8")
          match = re.search(r"^version:\s*['\"]?([^'\"\n]+)['\"]?\s*$", text, re.MULTILINE)
          if not match:
              raise SystemExit("manifest.yml does not contain a version field")
          print(match.group(1).strip())
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag is new
        run: |
          git fetch --tags --force
          if git rev-parse "${{ steps.manifest.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.manifest.outputs.tag }} already exists. Update manifest.yml before releasing."
            exit 1
          fi

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install PDF dependencies
        run: quarto install tinytex --update-path

      - name: Render PDF
        run: quarto render --to pdf --profile es

      - name: Prepare release PDF
        run: |
          PDF=$(find _output -maxdepth 1 -type f -name '*.pdf' | head -n 1)
          if [ -z "$PDF" ]; then
            echo "No PDF was generated under _output/."
            exit 1
          fi
          cp "$PDF" "prioriza-method-${{ steps.manifest.outputs.version }}-es.pdf"

      - name: Upload release candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: prioriza-method-${{ steps.manifest.outputs.version }}-es
          path: prioriza-method-${{ steps.manifest.outputs.version }}-es.pdf
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.manifest.outputs.tag }}
          name: "Prioriza Method - ${{ steps.manifest.outputs.version }}"
          body: "Manual PDF release for Prioriza Method ${{ steps.manifest.outputs.version }}."
          files: prioriza-method-${{ steps.manifest.outputs.version }}-es.pdf
