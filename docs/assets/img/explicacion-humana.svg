<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">Explicación humana del resultado Prioriza</title>
  <desc id="desc">El cálculo trazable se traduce en explicación humana y preguntas de revisión.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3a44"/>
    </marker>
    <style>
      .panel { fill: #f7f9fb; stroke: #2f3a44; stroke-width: 2; rx: 8; }
      .calc { fill: #edf4ff; stroke: #315c9c; }
      .human { fill: #eaf4ef; stroke: #1f6f4a; }
      .review { fill: #fff4df; stroke: #9b5a00; }
      .text { font: 18px Arial, sans-serif; fill: #17212b; text-anchor: middle; }
      .small { font: 15px Arial, sans-serif; fill: #34424f; text-anchor: middle; }
      .arrow { stroke: #2f3a44; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="panel" x="35" y="48" width="180" height="116"/>
  <text class="text" x="125" y="78">Valores</text>
  <text class="text" x="125" y="104">Niveles</text>
  <text class="text" x="125" y="130">Prioridad de</text>
  <text class="text" x="125" y="154">aspectos</text>

  <rect class="calc" x="280" y="70" width="150" height="74" rx="8"/>
  <text class="text" x="355" y="102">Cálculo</text>
  <text class="small" x="355" y="126">trazable</text>

  <rect class="human" x="505" y="48" width="185" height="116" rx="8"/>
  <text class="text" x="598" y="82">Explicación</text>
  <text class="text" x="598" y="108">humana</text>
  <text class="small" x="598" y="136">razones y comparación</text>

  <rect class="review" x="735" y="48" width="130" height="116" rx="8"/>
  <text class="text" x="800" y="90">Preguntas</text>
  <text class="text" x="800" y="116">de revisión</text>

  <path class="arrow" d="M215 106 H278"/>
  <path class="arrow" d="M430 106 H503"/>
  <path class="arrow" d="M690 106 H733"/>

  <rect class="panel" x="135" y="230" width="250" height="78"/>
  <text class="small" x="260" y="260">No basta decir:</text>
  <text class="text" x="260" y="286">“A tiene prioridad 1”</text>

  <rect class="human" x="515" y="218" width="270" height="102" rx="8"/>
  <text class="small" x="650" y="248">Debe explicar:</text>
  <text class="text" x="650" y="274">por qué A, por qué no B,</text>
  <text class="text" x="650" y="298">y qué cambiaría el resultado</text>
</svg>
