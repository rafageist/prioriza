<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">Ciclo de refinamiento progresivo de Prioriza</title>
  <desc id="desc">Flujo desde ejecutar Prioriza hasta formular una pregunta, refinar el modelo y recalcular.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3a44"/>
    </marker>
    <style>
      .box { fill: #f7f9fb; stroke: #2f3a44; stroke-width: 2; rx: 8; }
      .accent { fill: #eaf4ef; stroke: #1f6f4a; }
      .warn { fill: #fff4df; stroke: #9b5a00; }
      .text { font: 18px Arial, sans-serif; fill: #17212b; text-anchor: middle; }
      .small { font: 15px Arial, sans-serif; fill: #34424f; text-anchor: middle; }
      .arrow { stroke: #2f3a44; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="box" x="40" y="60" width="150" height="78"/>
  <text class="text" x="115" y="94">Ejecutar</text>
  <text class="text" x="115" y="118">Prioriza</text>

  <rect class="box" x="240" y="60" width="150" height="78"/>
  <text class="text" x="315" y="94">Observar</text>
  <text class="text" x="315" y="118">resultado</text>

  <rect class="warn" x="440" y="45" width="180" height="108" rx="8"/>
  <text class="text" x="530" y="82">Empate,</text>
  <text class="text" x="530" y="107">contradicción o</text>
  <text class="text" x="530" y="132">insuficiencia</text>

  <rect class="accent" x="680" y="60" width="170" height="78" rx="8"/>
  <text class="text" x="765" y="94">Nueva</text>
  <text class="text" x="765" y="118">pregunta</text>

  <rect class="box" x="450" y="225" width="170" height="78"/>
  <text class="text" x="535" y="257">Refinar</text>
  <text class="text" x="535" y="281">modelo</text>

  <rect class="box" x="240" y="225" width="150" height="78"/>
  <text class="text" x="315" y="257">Recalcular</text>
  <text class="small" x="315" y="281">si cambia el modelo</text>

  <path class="arrow" d="M190 99 H238"/>
  <path class="arrow" d="M390 99 H438"/>
  <path class="arrow" d="M620 99 H678"/>
  <path class="arrow" d="M765 138 V195 C765 220 650 230 622 255"/>
  <path class="arrow" d="M450 264 H392"/>
  <path class="arrow" d="M315 225 V175 C315 150 190 148 150 140"/>
  <text class="small" x="115" y="222">Si no hay distinción relevante:</text>
  <text class="small" x="115" y="245">aceptar equivalencia</text>
</svg>
